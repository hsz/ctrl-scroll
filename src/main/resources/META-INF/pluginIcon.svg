<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer background -->
    <rect width="200" height="200" rx="20" fill="#2D3E50"/>

    <!-- IDE window -->
    <rect x="10" y="20" width="180" height="160" rx="10" fill="#1C2833"/>

    <!-- IDE header buttons -->
    <circle cx="25" cy="35" r="5" fill="#5D6D7E"/>
    <circle cx="40" cy="35" r="5" fill="#5D6D7E"/>
    <circle cx="55" cy="35" r="5" fill="#5D6D7E"/>

    <!-- Left tall panel -->
    <rect x="20" y="60" width="25" height="80" fill="#5D6D7E" rx="4"/>

    <!-- Right tall panel -->
    <rect x="155" y="60" width="25" height="80" fill="#5D6D7E" rx="4"/>

    <!-- Bottom wide panel (not intersecting side panels) -->
    <rect x="20" y="150" width="160" height="20" fill="#5D6D7E" rx="4"/>

    <!-- Mouse shape -->
    <rect x="80" y="65" width="40" height="65" rx="15" fill="white"/>
    <line x1="100" y1="65" x2="100" y2="100" stroke="#2D3E50" stroke-width="4"/>

    <!-- Scroll arrow -->
    <path d="M 90 55 L 100 45 L 110 55" fill="none" stroke="white" stroke-width="4"/>
    <line x1="100" y1="45" x2="100" y2="60" stroke="white" stroke-width="4"/>
</svg>
